name: Build Kernel

on: 
  workflow_dispatch:
    inputs:
      DEVICE_NAME:
        description: 'Your device codename.'
        required: true
        default: 'salaa'
      ANDROID_VERSION:
        description: 'Your android version.'
        required: true
        default: 'v-oss'
        type: choice
        options:
        - v-oss
        - u-oss
        - t-oss
        - s-oss
        - r-oss

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3

    # [УСКОРЕНИЕ] Шаг для сохранения и восстановления компиляционного кэша ccache
    - name: Setup Compiler Cache
      uses: actions/cache@v4
      with:
        path: /home/runner/work/.ccache
        key: kernel-ccache-${{ github.event.inputs.DEVICE_NAME }}-${{ github.sha }}
        restore-keys: |
          kernel-ccache-${{ github.event.inputs.DEVICE_NAME }}-
          kernel-ccache-

    - name: Start Building Kernel
      run: |
        chmod +x build
        export KBUILD_BUILD_USER="${{ github.actor }}"
        export KBUILD_BUILD_HOST="${{ github.event.inputs.DEVICE_NAME }}"
        ./build

    - name: Set Properties
      id: props
      run: |
        echo "date=$(TZ=Asia/Manila date +%Y%m%d-%I%M%p)" >> $GITHUB_OUTPUT

    - name: Release Flashable AnyKernel3 Zip
      uses: ncipollo/release-action@v1.12.0
      with:
        artifacts: |
          /home/runner/work/Bolt-ZAP-*.zip
          /home/runner/work/myKernel/build.log
        name: Bolt-ZAP Kernel for ${{ github.event.inputs.DEVICE_NAME }} - ${{ steps.props.outputs.date }}
        draft: false
        prerelease: false
        tag: ${{ github.run_id }}-${{ steps.props.outputs.date }}
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          ## Сборка завершена!
            - **Устройство:** ${{ github.event.inputs.DEVICE_NAME }}
            - **Ветка Android:** ${{ github.event.inputs.ANDROID_VERSION }}
            - Прошивайте архив Bolt-ZAP через OrangeFox Recovery.
            - Лог компиляции (build.log) прикреплен ниже.

    - name: Link of Release
      run: |
        echo "Enjoy your Newly Built Kernel"
        echo "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ github.run_id }}-${{ steps.props.outputs.date }}"
